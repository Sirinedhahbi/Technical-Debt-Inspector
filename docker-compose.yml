version: '3.8'

services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: pcd_sonarqube
    ports:
      - "9000:9000" 
    environment:
      - SONAR_FORCEAUTHENTICATION=false
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions

  backend:
    build: ./backend
    container_name: pcd_backend
    volumes:
      - ./backend:/app
    command: python -u app/main.py
    environment:
      - DB_HOST=db
      - SONAR_HOST=http://sonarqube:9000
    depends_on:
      - db
      - sonarqube

# frontend:
#   build: ./frontend
#   container_name: pcd_frontend
#   ports:
#     - "3000:3000" 
#   volumes:
#     - ./frontend:/app
#     - /app/node_modules
#   depends_on:
#     - backend 

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=technical_debt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
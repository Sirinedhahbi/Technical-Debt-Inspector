version: '3.8'

services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: pcd_sonarqube
    ports:
      - "9000:9000" 
    environment:
      - SONAR_FORCEAUTHENTICATION=false
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions

  backend:
    build: ./backend
    container_name: pcd_backend
    ports:
      - "8000:8000"                         
    volumes:
      - ./backend:/app
    #working_dir: /app/app # hedha besh enna7ouh w nraj3ou eli en commentaire louta fi blasstou 
    command: sh -c "cd /app/app && uvicorn main:app --host 0.0.0.0 --port 8000"   # python main.py
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=technical_debt_db
      - DB_USER=user
      - DB_PASSWORD=password
      - SONAR_HOST=http://sonarqube:9000
    depends_on:
      - sonarqube
      - db
      

  frontend: 
    build:
      context: ./frontend
    container_name: nextjs-app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    environment:
      - WATCHPACK_POLLING=true

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin  
      - ./servers.json:/pgadmin4/servers.json
      - ./pgpass:/pgadmin4/pgpass
    depends_on:
      - db

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=technical_debt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  pgadmin_data:
